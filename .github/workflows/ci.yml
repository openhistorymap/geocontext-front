name: CI

on:
  push:
    branches: [master, rewrite/**]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Build ported libraries
        env:
          LIBS: >-
            mn-registry
            mn-geo-datasources
            mn-geo-layers
            mn-geo
            mn-geo-flavours-leaflet
            mn-geo-layers-osm
            mn-geo-layers-ofm
            mn-geo-layers-geomqtt
            gcx-core
        run: |
          for lib in $LIBS; do
            echo "::group::ng build $lib"
            npx ng build "$lib"
            echo "::endgroup::"
          done

      - name: Build app
        run: npx ng build --configuration=production

      - name: Upload dist
        if: matrix.node == '20'
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/geocontext-front
          retention-days: 7
